version: '3.8'

services:
  # -----------------------------------------------------
  # 1. PostgreSQL - Relational Database
  # -----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: eip_postgres
    environment:
      POSTGRES_USER: eip_user
      POSTGRES_PASSWORD: eip_password
      POSTGRES_DB: eip_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - eip_network

  # -----------------------------------------------------
  # 2. Redis - Caching & Rate Limiting
  # -----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: eip_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - eip_network

  # -----------------------------------------------------
  # 3. Zookeeper (Required for Kafka)
  # -----------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: eip_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - eip_network

  # -----------------------------------------------------
  # 4. Kafka - Event Broker
  # -----------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: eip_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - eip_network

  # -----------------------------------------------------
  # 5. Neo4j - Graph Database
  # -----------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: eip_neo4j
    environment:
      NEO4J_AUTH: neo4j/eip_password
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    networks:
      - eip_network

  # -----------------------------------------------------
  # 6. Qdrant - Vector Database
  # -----------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.6.1
    container_name: eip_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - eip_network

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

networks:
  eip_network:
    driver: bridge
